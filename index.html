<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#9a6b4e"><title>Hokkaido Ski Trip 2026</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles/base.css"><link rel="stylesheet" href="styles/components.css"><link rel="stylesheet" href="styles/theme-latte.css"></head><body><div class="shell"><header class="hero card"><div class="hero-top"><div><h1 id="siteName">Hokkaido Ski Trip 2026</h1><p id="siteSubtitle" class="muted"></p><p class="hero-location muted">Sapporo / Teine</p></div></div><div class="quick-grid"><button class="quick-button" id="weatherBtn"><span class="quick-icon" id="weatherPreviewIcon">🌤️</span><div><b>札幌天氣</b><small id="weatherPreviewText">3°C</small></div></button><button class="quick-button" id="splitBtn"><span class="quick-icon">💴</span><div><b>分帳</b><small id="splitPreviewText">JPY / TWD</small></div></button><button class="quick-button" id="skiBtn"><span class="quick-icon">⛷️</span><div><b>手稻滑雪</b><small id="skiPreviewText">-8°C</small></div></button></div></header><main><section class="page active" data-page="itinerary"><div class="section-head compact"><div><h2>行程</h2><p class="muted">時間軸 + 地圖模式</p></div><div class="segmented"><button class="seg-btn active" data-view="timeline">時間軸</button><button class="seg-btn" data-view="map">地圖模式</button></div></div><div id="dayTabs" class="day-tabs"></div><div id="itineraryTimeline"></div><div id="itineraryMap" class="hidden"></div></section><section class="page" data-page="food"><div class="section-head compact"><div><h2>美食</h2><p class="muted">已存清單與 Google Maps 快捷</p></div></div><div id="foodGrid" class="grid"></div></section><section class="page" data-page="souvenir"><div class="section-head compact"><div><h2>伴手禮 / 藥妝辨識</h2><p class="muted">先看商品卡，再點開看成分與用途</p></div></div><div id="souvenirGrid" class="grid"></div></section><section class="page" data-page="expense"><div class="section-head compact"><div><h2>花費</h2><p class="muted">初版：資料來自行程表與本機新增資料</p></div></div><div id="summaryGrid" class="summary-grid"></div><section class="card form-card"><h3>新增花費（只存在本機）</h3><div class="form-grid"><label><span>項目</span><input id="expTitle" placeholder="例如：晚餐 / Taxi"></label><label><span>日期</span><select id="expDay"></select></label><label><span>幣別</span><select id="expCurrency"><option>JPY</option><option>TWD</option></select></label><label><span>金額</span><input id="expAmount" type="number" min="0" step="1"></label></div><div class="actions"><button class="btn primary" id="addExpenseBtn">加入花費</button><button class="btn ghost" id="clearLocalBtn">清除本機新增資料</button></div></section><div id="expenseList"></div></section></main><nav class="tabbar small"><button class="tab active" data-page-target="itinerary">🗓️<span>行程</span></button><button class="tab" data-page-target="food">🍜<span>美食</span></button><button class="tab" data-page-target="souvenir">🎁<span>伴手禮</span></button><button class="tab" data-page-target="expense">💴<span>花費</span></button></nav></div><dialog id="sheetDialog" class="sheet"><div class="sheet-head"><h3 id="sheetTitle">資訊</h3><button class="icon-btn" id="closeSheet">✕</button></div><div id="sheetBody"></div></dialog><script src="scripts/app.js"></script></body></html>

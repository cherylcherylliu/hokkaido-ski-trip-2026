<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokkaido Ski Trip 2026</title>

<link rel="stylesheet" href="styles/style.css">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f5f7;
}

/* Banner */

.banner{
background:white;
padding:12px 16px;
border-bottom:1px solid #eee;
}

.banner h1{
font-size:18px;
margin:0;
}

.trip-date{
font-size:13px;
color:#666;
margin:2px 0;
}

.trip-location{
font-size:13px;
color:#999;
margin-bottom:8px;
}

/* 三個快捷按鈕 */

.banner-actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

.banner-btn{
background:#f3f3f3;
padding:8px;
text-align:center;
border-radius:10px;
font-size:14px;
}

/* 主內容 */

.content{
padding:16px;
padding-bottom:80px;
}

.placeholder{
background:white;
border-radius:12px;
padding:20px;
}

/* Footer */

.footer{
position:fixed;
bottom:0;
width:100%;
height:56px;
background:white;
border-top:1px solid #eee;
display:flex;
align-items:center;
justify-content:center;
}

.nav{
display:flex;
gap:26px;
font-size:14px;
}

</style>
</head>

<body>

<header class="banner">

<h1>Hokkaido Ski Trip 2026</h1>
<p class="trip-date">2026/03/12 – 03/17</p>
<p class="trip-location">Sapporo / Teine</p>

<div class="banner-actions">

<div class="banner-btn">
☀️ 3°C
</div>

<div class="banner-btn">
💰 分帳
</div>

<div class="banner-btn">
⛷ -8°C
</div>

</div>

</header>

<main class="content">

<h2>行程</h2>

<div class="placeholder">
行程內容會顯示在這裡
</div>

</main>

<footer class="footer">

<div class="nav">
<span>📅 行程</span>
<span>🍜 美食</span>
<span>🎁 伴手禮</span>
<span>💰 花費</span>
</div>

</footer>

</body>
</html>
